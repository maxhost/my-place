# Gate de tests vitest BLOQUEANTE en PRs a main (Phase 0.C tech-debt closure,
# 2026-05-28). Pre-V1.2 el único CI era `lighthouse.yml` (typecheck + lint +
# build + lhci) — la suite de 1135 tests NO protegía PRs, regresiones podían
# mergearse silenciosamente. Este workflow cubre esa brecha.
#
# ## Por qué workflow separado (no extender lighthouse.yml)
#
# (1) Aislar tiempos: lhci toma ~3-5 min adicionales, no debe pelear con el
# loop tight de tests. (2) Status check independiente en branch protection
# permite distinguir "test failed" vs "perf budget excedido". (3) Si lhci
# requiere infra distinta (build artifact, preview URL), no contamina el
# entorno de tests.
#
# ## Env vars requeridos en GitHub Secrets
#
# Los tests integration (`src/**/*.test.ts` en project `node` per
# `vitest.config.ts`) conectan a Neon vía:
#   - DATABASE_URL_TEST: rol `app_system` (NO-admin, sin BYPASSRLS) del
#     branch `test` de Neon. Lo usan los tests para ejercitar RLS realista.
#   - DATABASE_URL_TEST_MIGRATE: rol admin (`neondb_owner`) del MISMO branch.
#     SOLO lo usa el harness `db-test-pool.ts` para seed pre-RLS.
#
# Setup canónico (one-time):
#   1. En Neon dashboard del proyecto `prod-place`: crear branch nuevo `test`
#      desde `production` (o `main`, según naming).
#   2. Obtener 2 connection strings: una con rol `app_system`, otra con
#      `neondb_owner`. Vienen de Neon UI → Connection Details.
#   3. En GitHub repo → Settings → Secrets and variables → Actions → New
#      repository secret. Agregar ambos secrets con los nombres exactos
#      `DATABASE_URL_TEST` y `DATABASE_URL_TEST_MIGRATE`.
#   4. Re-run el workflow desde Actions tab.
#
# Si los secrets faltan, los tests `node` fallarán con "connection refused"
# o "missing connection string" — flag explícito de "setup pendiente", no
# regresión de código.

name: tests

on:
  pull_request:
    branches: [main]

jobs:
  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # suite full toma ~8min cold, +margen para flakes Neon
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Projects en pasos separados (Phase 2.C.1, 2026-06-02): status check
      # independiente por capa — un fail dice de una si rompió la DB/lógica
      # (node) o la UI (jsdom). El project `node` (integration contra Neon)
      # lleva los secrets; el `ui` (jsdom puro) no toca DB. NO es un fix de
      # flake: la investigación 2.C.1 corrió la suite 6x (5 bajo carga 8x) sin
      # reproducir el flake del 2026-05-28 → ver docs/gotchas/vitest-parallel-projects-flake.md.
      - name: Vitest project node (integration + lógica)
        run: pnpm test:node
        env:
          DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
          DATABASE_URL_TEST_MIGRATE: ${{ secrets.DATABASE_URL_TEST_MIGRATE }}

      - name: Vitest project ui (componentes jsdom)
        run: pnpm test:ui

  # Reporte i18n drift informativo (ADR-0052, Phase 3.E tech-debt closure).
  # NO bloqueante por construcción: `check-translations.mjs` hace `exit 0`
  # SIEMPRE (ver su §1) — el drift de traducciones queda visible en el log de
  # Actions pero NUNCA marca el job en rojo. La red de seguridad real es el
  # deep-merge runtime de `src/i18n/request.ts` (ADR-0024): UX nunca renderea
  # una key cruda. Job SEPARADO a propósito:
  #   - sin `needs` → corre en paralelo con `vitest` (no serializa el gate).
  #   - sin `pnpm install` → el script es Node ESM puro (`fs`/`path`/`url`,
  #     cero deps de runtime) → sólo checkout + setup-node. Más rápido, no
  #     toca el lockfile.
  #   - sin secrets → no toca DB ni red.
  # Refina ADR-0024 §87 ("no corre en CI") vía ADR-0052: la sustancia
  # (NO fail-closed) queda intacta. Fail-closed selectivo en CI sigue diferido
  # a un check separado en su propia ADR (ADR-0024 §87/§158).
  translations:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: check-translations (drift i18n informativo, ADR-0024/0052)
        run: node scripts/check-translations.mjs

  # Coverage + comment en PR (Phase 2.C.3, 2026-06-02). Job SEPARADO con
  # `needs: vitest` a propósito:
  #   (1) corre DESPUÉS del gate bloqueante → NO se solapa con `test:node`
  #       sobre el MISMO branch `test` de Neon (la gotcha 2.C.1 deja como causa
  #       probable del flake del 28/05 la presión de conexiones concurrentes;
  #       serializar elimina ese riesgo sin tocar pools).
  #   (2) sólo corre si los tests pasan → no gastamos la corrida con coverage
  #       (instrumentada, más lenta) cuando ya hay un fail que arreglar.
  # `pnpm test:coverage` = `vitest run --coverage` (ambos projects, merge nativo
  # de cobertura). Los thresholds viven en `vitest.config.ts`: si la cobertura
  # cae bajo el piso, este job falla (gate de no-regresión). El comment se postea
  # igual (`if: always()` + `reportOnFailure` en config) para ver el porqué.
  coverage:
    needs: vitest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Coverage (ambos projects, merge nativo)
        run: pnpm test:coverage
        env:
          DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
          DATABASE_URL_TEST_MIGRATE: ${{ secrets.DATABASE_URL_TEST_MIGRATE }}

      - name: Comment coverage en el PR
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
